services:
  app:
    image: aftermarketmonkey_be:latest
    build:
      context: .
    restart: always
    env_file:
      - ./.env.app.${DEPLOY_ENV:-production}
    ports:
      - "8005:8000"
    depends_on:
      - cache-redis



  cache-redis:
    image: redis:7.2-rc1-alpine
    volumes:
      - redis_data:/var/lib/redis/data/
    ports:
      - "6385:6379"
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.11
    volumes:
      # Bind mount to the larger secondary volume, not a named Docker volume on the root
      # disk — Meilisearch's data grew to ~22GB and the root disk is only 38GB, which
      # caused repeated 100%-full incidents. Moved 2026-07-21.
      - /mnt/HC_Volume_105491695/meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      # Was previously missing here entirely — the container had been running with a key
      # from whenever it was first started outside of this compose file, so recreating it
      # (e.g. for the volume move above) came up with NO master key and accepted
      # unauthenticated requests on a port that's open to the public internet. Must match
      # MEILISEARCH_MASTER_KEY in .env.app.<env>, which is what the Django app itself uses.
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    restart: always


volumes:
  redis_data:
